<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--bg-app); padding: 22px; }
  #r { display: flex; flex-direction: column; gap: 16px; max-width: 640px; }
  .line { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .cap { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-faint); width: 64px; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
  <div id="r"></div>
  <script type="text/babel">
    const { Composer, SegmentedControl, Switch } = window.DevLogDesignSystem_c9930f;
    function Demo() {
      return (
        <>
          <Composer context="/metai/cad-agent/adapter" defaultValue="" />
          <div className="line"><span className="cap">range</span>
            <SegmentedControl options={['Today','Last Week','All']} defaultValue="Today" />
          </div>
          <div className="line"><span className="cap">switch</span>
            <Switch defaultChecked />
            <span style={{ fontFamily:'var(--font-mono)', fontSize:13, color:'var(--text-secondary)' }}>Dark theme</span>
          </div>
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById('r')).render(<Demo />);
  </script>
</body>
</html>
