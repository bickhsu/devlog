<!-- @dsCard group="Brand" viewport="700x180" name="Iconography" subtitle="Lucide — clean 2px monoline strokes" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-app); color: var(--text-primary); font-family: var(--font-mono); padding: 24px; }
  .row { display: flex; gap: 22px; flex-wrap: wrap; }
  .ic { display: flex; flex-direction: column; align-items: center; gap: 8px; width: 64px; }
  .ic svg { color: var(--text-primary); }
  .ic span.n { font-size: 10px; color: var(--text-faint); }
</style>
<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div class="row" id="r"></div>
  <script>
    const names = ['panel-left-open','copy','settings','chevron-right','check','x','plus','clock','moon','zap'];
    const labels = ['panel','copy','settings','drill','ok','close','new','time','theme','command'];
    const r = document.getElementById('r');
    names.forEach((n, i) => {
      const wrap = document.createElement('div'); wrap.className = 'ic';
      const node = (window.lucide.icons || window.lucide)[n.split('-').map(s=>s[0].toUpperCase()+s.slice(1)).join('')];
      const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
      svg.setAttribute('width','26'); svg.setAttribute('height','26'); svg.setAttribute('viewBox','0 0 24 24');
      svg.setAttribute('fill','none'); svg.setAttribute('stroke','currentColor'); svg.setAttribute('stroke-width','2');
      svg.setAttribute('stroke-linecap','round'); svg.setAttribute('stroke-linejoin','round');
      (node || []).forEach(([tag, attrs]) => {
        const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
        Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, v));
        svg.appendChild(el);
      });
      const lbl = document.createElement('span'); lbl.className = 'n'; lbl.textContent = labels[i];
      wrap.appendChild(svg); wrap.appendChild(lbl); r.appendChild(wrap);
    });
  </script>
</body>
</html>
