<!-- @dsCard group="Colors" viewport="700x190" name="Base ramp" subtitle="shadcn default surfaces — neutral grayscale, HSL-based" -->
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-app); color: var(--text-primary); font-family: var(--font-sans); padding: 20px; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; }
  .sw { flex: 1 1 0; min-width: 76px; }
  .chip { height: 64px; border-radius: var(--radius); border: 1px solid var(--border); }
  .name { font-size: 11px; color: var(--text-secondary); margin-top: 8px; }
  .val { font-size: 10px; color: var(--muted-foreground); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--background)"></div><div class="name">--background</div><div class="val">0 0% 3.9%</div></div>
    <div class="sw"><div class="chip" style="background:var(--card)"></div><div class="name">--card</div><div class="val">0 0% 3.9%</div></div>
    <div class="sw"><div class="chip" style="background:var(--secondary)"></div><div class="name">--secondary</div><div class="val">0 0% 14.9%</div></div>
    <div class="sw"><div class="chip" style="background:var(--accent)"></div><div class="name">--accent / hover</div><div class="val">0 0% 14.9%</div></div>
    <div class="sw"><div class="chip" style="background:var(--muted)"></div><div class="name">--muted</div><div class="val">0 0% 14.9%</div></div>
    <div class="sw"><div class="chip" style="background:var(--border)"></div><div class="name">--border / --input</div><div class="val">0 0% 14.9%</div></div>
  </div>
</body>
</html>
