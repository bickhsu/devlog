<!-- @dsCard group="Colors" viewport="700x190" name="Text ramp" subtitle="shadcn foreground / muted-foreground" -->
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-app); color: var(--text-primary); font-family: var(--font-sans); padding: 20px; }
  .rows { display: flex; flex-direction: column; gap: 2px; }
  .r { display: flex; align-items: baseline; gap: 14px; padding: 5px 0; }
  .sample { font-size: 18px; font-weight: 500; width: 280px; }
  .tok { font-size: 12px; color: var(--muted-foreground); }
  .hex { font-size: 11px; color: var(--muted-foreground); margin-left: auto; }
</style>
</head>
<body>
  <div class="rows">
    <div class="r"><span class="sample" style="color:var(--foreground)">Foreground — primary text</span><span class="tok">--foreground</span><span class="hex">0 0% 98%</span></div>
    <div class="r"><span class="sample" style="color:var(--muted-foreground)">Muted — secondary / metadata</span><span class="tok">--muted-foreground</span><span class="hex">0 0% 63.9%</span></div>
    <div class="r"><span class="sample" style="color:var(--primary)">Primary — main action</span><span class="tok">--primary</span><span class="hex">0 0% 98%</span></div>
    <div class="r"><span class="sample" style="color:var(--secondary-foreground)">Secondary foreground</span><span class="tok">--secondary-foreground</span><span class="hex">0 0% 98%</span></div>
    <div class="r"><span class="sample" style="color:var(--ring)">Ring — focus indicator</span><span class="tok">--ring</span><span class="hex">0 0% 83.1%</span></div>
  </div>
</body>
</html>
