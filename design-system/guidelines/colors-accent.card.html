<!-- @dsCard group="Colors" viewport="700x180" name="Action & status" subtitle="shadcn primary + destructive + utility status" -->
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-app); color: var(--text-primary); font-family: var(--font-sans); padding: 20px; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; }
  .sw { flex: 1 1 0; min-width: 84px; }
  .chip { height: 56px; border-radius: var(--radius); display: flex; align-items: flex-end; padding: 7px; }
  .name { font-size: 11px; color: var(--text-secondary); margin-top: 8px; }
  .val { font-size: 10px; color: var(--muted-foreground); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--primary)"></div><div class="name">--primary</div><div class="val">0 0% 98%</div></div>
    <div class="sw"><div class="chip" style="background:var(--secondary)"></div><div class="name">--secondary</div><div class="val">0 0% 14.9%</div></div>
    <div class="sw"><div class="chip" style="background:var(--accent)"></div><div class="name">--accent</div><div class="val">0 0% 14.9%</div></div>
    <div class="sw"><div class="chip" style="background:var(--destructive)"></div><div class="name">--destructive</div><div class="val">0 62.8% 30.6%</div></div>
    <div class="sw"><div class="chip" style="background:var(--success)"></div><div class="name">--success</div><div class="val">142 76% 36%</div></div>
    <div class="sw"><div class="chip" style="background:var(--warning)"></div><div class="name">--warning</div><div class="val">38 92% 50%</div></div>
  </div>
</body>
</html>
