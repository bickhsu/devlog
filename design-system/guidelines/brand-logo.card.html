<!-- @dsCard group="Brand" viewport="700x200" name="Logo" subtitle="Terminal caret + mono wordmark" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-app); color: var(--text-primary); font-family: var(--font-mono); padding: 26px; display: flex; align-items: center; gap: 40px; flex-wrap: wrap; }
  .lock { display: inline-flex; align-items: center; gap: 9px; font-size: 28px; font-weight: 600; letter-spacing: -0.02em; }
  .caret { display: inline-block; width: 9px; height: 28px; background: var(--accent); border-radius: 2px; animation: blink 1.1s steps(1) infinite; }
  @keyframes blink { 0%,50%{opacity:1} 50.01%,100%{opacity:0} }
  .faint { color: var(--text-faint); }
  .lbl { font-size: 10px; color: var(--text-faint); margin-top: 12px; }
  .col { text-align: center; }
  .mark { display:inline-flex; width:46px; height:46px; align-items:center; justify-content:center; background:var(--surface); border:1px solid var(--border); border-radius:12px; }
</style>
</head>
<body>
  <div class="col"><div class="lock"><span class="caret"></span>devlog</div><div class="lbl">primary lockup</div></div>
  <div class="col"><div class="lock"><span class="faint">[</span>&nbsp;devlog&nbsp;<span class="faint">]</span></div><div class="lbl">bracket lockup</div></div>
  <div class="col"><span class="mark"><span style="width:6px;height:24px;background:var(--accent);border-radius:2px;display:inline-block"></span></span><div class="lbl">app icon</div></div>
</body>
</html>
