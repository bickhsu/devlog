<!-- @dsCard group="Brand" viewport="700x180" name="Context paths" subtitle="Paths are sacred — mono, leading slash, kebab segments" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-app); color: var(--text-primary); font-family: var(--font-mono); padding: 24px; }
  .badge { display:inline-flex; align-items:center; height:30px; padding:0 11px; gap:1px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm); font-size:13px; }
  .slash { color: var(--text-faint); padding: 0 1px; }
  .seg { color: var(--text-muted); }
  .leaf { color: var(--text-primary); font-weight: 600; }
  .at { color: var(--text-faint); margin-right: 5px; }
  .lbl { font-size: 11px; color: var(--text-faint); margin: 18px 0 8px; letter-spacing: 0.06em; text-transform: uppercase; }
  .inline { color: var(--path); }
  p { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }
</style>
</head>
<body>
  <div class="badge"><span class="at">@</span><span class="slash">/</span><span class="seg">metai</span><span class="slash">/</span><span class="seg">cad-agent</span><span class="slash">/</span><span class="leaf">adapter</span></div>
  <div class="lbl">in running text</div>
  <p>shipped the <span class="inline">/metai/cad-agent/adapter/migration-test</span> fixer; segments stay <span class="inline">kebab-case</span>, slashes faint.</p>
</body>
</html>
