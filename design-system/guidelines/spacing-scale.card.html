<!-- @dsCard group="Spacing" viewport="700x170" name="Spacing scale" subtitle="4px base unit" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-app); color: var(--text-primary); font-family: var(--font-mono); padding: 22px; display: flex; align-items: flex-end; gap: 14px; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .bar { background: var(--accent); border-radius: 2px; width: 100%; }
  .wrap { width: 28px; display: flex; align-items: flex-end; height: 64px; }
  .n { font-size: 10px; color: var(--text-faint); }
</style>
</head>
<body>
  <div class="col"><div class="wrap"><div class="bar" style="height:4px"></div></div><div class="n">1·4</div></div>
  <div class="col"><div class="wrap"><div class="bar" style="height:8px"></div></div><div class="n">2·8</div></div>
  <div class="col"><div class="wrap"><div class="bar" style="height:12px"></div></div><div class="n">3·12</div></div>
  <div class="col"><div class="wrap"><div class="bar" style="height:16px"></div></div><div class="n">4·16</div></div>
  <div class="col"><div class="wrap"><div class="bar" style="height:24px"></div></div><div class="n">6·24</div></div>
  <div class="col"><div class="wrap"><div class="bar" style="height:32px"></div></div><div class="n">8·32</div></div>
  <div class="col"><div class="wrap"><div class="bar" style="height:48px"></div></div><div class="n">12·48</div></div>
  <div class="col"><div class="wrap"><div class="bar" style="height:64px"></div></div><div class="n">16·64</div></div>
</body>
</html>
