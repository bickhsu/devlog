<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-app); color: var(--text-primary); font-family: var(--font-mono); padding: 22px; display: flex; gap: 16px; flex-wrap: wrap; }
  .col { flex: 1 1 0; min-width: 90px; text-align: center; }
  .box { height: 64px; background: var(--surface-raised); border: 1px solid var(--border); }
  .n { font-size: 10px; color: var(--text-faint); margin-top: 8px; }
</style>
</head>
<body>
  <div class="col"><div class="box" style="border-radius:var(--radius-xs)"></div><div class="n">xs · 4</div></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="n">sm · 6</div></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-md)"></div><div class="n">md · 8</div></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="n">lg · 12</div></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-xl)"></div><div class="n">xl · 16</div></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-pill)"></div><div class="n">pill</div></div>
</body>
</html>
