<!-- @dsCard group="Spacing" viewport="700x180" name="Elevation" subtitle="Restrained, cool-toned — depth from borders, not glow" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-app); color: var(--text-secondary); font-family: var(--font-mono); padding: 26px; display: flex; gap: 22px; flex-wrap: wrap; align-items: center; }
  .col { flex: 1 1 0; min-width: 110px; text-align: center; }
  .box { height: 66px; background: var(--surface-raised); border: 1px solid var(--border); border-radius: var(--radius-md); }
  .n { font-size: 10px; color: var(--text-faint); margin-top: 12px; }
</style>
</head>
<body>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-xs)"></div><div class="n">shadow-xs</div></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="n">shadow-sm · cards</div></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-popover)"></div><div class="n">shadow-popover</div></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="n">shadow-lg · modal</div></div>
</body>
</html>
