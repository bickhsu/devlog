<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-app); color: var(--text-primary); font-family: var(--font-mono); padding: 22px; }
  .r { display: flex; align-items: baseline; gap: 16px; padding: 5px 0; border-bottom: 1px solid var(--border-subtle); }
  .r:last-child { border-bottom: none; }
  .lbl { font-size: 10px; color: var(--text-faint); width: 130px; flex: 0 0 auto; }
  .s { color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
</style>
</head>
<body>
  <div class="r"><span class="lbl">4xl · 48 · display</span><span class="s" style="font-size:48px;font-weight:600;letter-spacing:-0.02em">devlog</span></div>
  <div class="r"><span class="lbl">2xl · 26 · title</span><span class="s" style="font-size:26px;font-weight:600">Settings</span></div>
  <div class="r"><span class="lbl">xl · 20 · section</span><span class="s" style="font-size:20px;font-weight:500">This week</span></div>
  <div class="r"><span class="lbl">lg · 16 · log body</span><span class="s" style="font-size:16px">Set up BuildingSchemaAdapter repo</span></div>
  <div class="r"><span class="lbl">md · 15 · sidebar</span><span class="s" style="font-size:15px;color:var(--text-secondary)">/metai/cad-agent</span></div>
  <div class="r"><span class="lbl">sm · 13 · UI</span><span class="s" style="font-size:13px;color:var(--text-secondary)">migration-test</span></div>
  <div class="r"><span class="lbl">xs · 12 · meta</span><span class="s" style="font-size:12px;color:var(--text-muted)">2026/06/12 · 14:32</span></div>
  <div class="r"><span class="lbl">2xs · 11 · eyebrow</span><span class="s" style="font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-faint)">switch context</span></div>
</body>
</html>
