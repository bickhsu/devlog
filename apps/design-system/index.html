<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <title>DevLog Design System</title>
    <script>
      document.documentElement.classList.toggle(
        "dark",
        localStorage.getItem("devlog-theme") !== "light"
      )

      const themeColor = localStorage.getItem("devlog-theme-color")
      if (themeColor) {
        const foreground =
          localStorage.getItem("devlog-theme-color-foreground") ?? "#18181b"
        const root = document.documentElement

        root.style.setProperty("--primary", themeColor)
        root.style.setProperty("--primary-foreground", foreground)
        root.style.setProperty("--ring", themeColor)
        root.style.setProperty("--sidebar-primary", themeColor)
        root.style.setProperty("--sidebar-primary-foreground", foreground)
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
